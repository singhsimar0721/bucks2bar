<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucks2Bar - Income & Expense Tracker</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient mb-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">💰 Bucks2Bar</span>
            <span class="navbar-text text-white">Income & Expense Tracker</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid px-3 px-md-4">
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-panel" type="button" role="tab" aria-controls="data-panel" aria-selected="true">
                    📊 Data
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart-panel" type="button" role="tab" aria-controls="chart-panel" aria-selected="false">
                    📈 Chart
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            
            <!-- DATA TAB -->
            <div class="tab-pane fade show active" id="data-panel" role="tabpanel" aria-labelledby="data-tab">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title mb-4 text-gradient">Monthly Income & Expenses</h5>
                        
                        <!-- Data Input Form -->
                        <form id="dataForm">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead class="table-header-bg">
                                        <tr>
                                            <th scope="col" class="col-4 col-md-3">Month</th>
                                            <th scope="col" class="col-4 col-md-4">Income (USD)</th>
                                            <th scope="col" class="col-4 col-md-4">Expenses (USD)</th>
                                        </tr>
                                    </thead>
                                    <tbody id="monthsTableBody">
                                        <!-- Monthly rows will be generated by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </form>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2 mt-4 justify-content-end flex-wrap">
                            <button type="button" class="btn btn-danger" id="clearBtn">
                                <i class="bi bi-trash"></i> Clear All
                            </button>
                            <button type="button" class="btn btn-success" id="saveBtn">
                                <i class="bi bi-check-circle"></i> Save Data
                            </button>
                        </div>

                        <!-- Feedback Message -->
                        <div id="feedbackMessage" class="mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>

            <!-- CHART TAB -->
            <div class="tab-pane fade" id="chart-panel" role="tabpanel" aria-labelledby="chart-tab">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title mb-4 text-gradient">Income vs Expenses - Monthly Overview</h5>
                        
                        <!-- Download Button -->
                        <div class="mb-3">
                            <button type="button" class="btn btn-primary" id="downloadChartBtn">
                                <i class="bi bi-download"></i> Download Chart as PNG
                            </button>
                        </div>
                        
                        <!-- Chart Canvas -->
                        <div class="chart-container" style="position: relative; height: 400px; margin-bottom: 20px;">
                            <canvas id="incomeExpenseChart"></canvas>
                        </div>

                        <!-- Chart Legend/Info -->
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <div class="alert alert-info d-flex align-items-center" role="alert">
                                    <div class="chart-legend-item me-3">
                                        <div class="legend-color" style="background-color: #667eea; width: 20px; height: 20px; border-radius: 4px;"></div>
                                    </div>
                                    <div>Income</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="alert alert-danger d-flex align-items-center" role="alert">
                                    <div class="chart-legend-item me-3">
                                        <div class="legend-color" style="background-color: #f093fb; width: 20px; height: 20px; border-radius: 4px;"></div>
                                    </div>
                                    <div>Expenses</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <!-- Custom Scripts -->
    <script src="js/dataManager.js"></script>
    <script src="js/chartManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
